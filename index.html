<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una sorpresa para ti</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="valentines">
        <div class="envelope">
            <div class="card">
                <div class="text">
                    <strong>Para mi chiquita enojona:❤️💕❤️</strong><br>
                    <p>"Sé que no es mucho, pero lo hice pensando en ti. Quiero que recuerdes que amo todo de ti: cómo sonríes, cómo te enojas, cómo me quieres, incluso cuando te pones triste... lo amo todo.

Siempre recuerda que, aunque a veces no lo diga, te extraño muchooo mi enojona."</p>
                    <div class="heart-small"></div>
                </div>
            </div>
        </div>
        <div class="front"></div>
        <div class="top-flap"></div>
        <div class="heart-icon"></div>
    </div>
</body>
</html>
